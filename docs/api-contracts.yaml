# Agentic Digest Generation: API Contracts
# Defines all tool interfaces, the orchestrator interface, and the Gemini tool-use protocol
# Technology-agnostic but informed by Gemini function-calling capabilities

# ============================================================================
# Top-Level Orchestrator Interface
# ============================================================================

contracts:

  CLI_to_Orchestrator:
    operation: "Run"
    description: "Execute agentic digest generation for a given session configuration"

    input_schema:
      ctx:
        type: context
        description: "Go context for cancellation and timeout"
      session:
        type: AgentSession
        required: true
        fields:
          input_file:
            type: string
            required: true
            description: "Path to markdown file containing URLs"
          output_path:
            type: string
            required: true
            description: "Directory for rendered output"
            default: "digests"
          max_iterations:
            type: integer
            required: false
            default: 3
            description: "Maximum reflect/revise cycles"
          quality_threshold:
            type: number
            required: false
            default: 0.7
            description: "Minimum quality score to accept (0.0-1.0)"
          use_cache:
            type: boolean
            required: false
            default: true
            description: "Whether to use content cache"

    output_schema:
      success:
        type: AgentDigestResult
        fields:
          digest: Digest
          markdown_path: string
          processing_stats: ProcessingStats
          agent_metadata: AgentMetadata
      errors:
        - code: NO_INPUT_FILE
          message: "Input file does not exist or is empty"
        - code: NO_VALID_ARTICLES
          message: "No articles could be fetched (all URLs failed)"
        - code: ORCHESTRATOR_TIMEOUT
          message: "Agent exceeded maximum execution time"
        - code: LLM_UNAVAILABLE
          message: "Gemini API is not reachable"
        - code: FALLBACK_TRIGGERED
          message: "Agent failed; fell back to linear pipeline"

    behavior:
      sync: true
      timeout: 600000ms   # 10 minutes
      idempotent: false
      fallback: "Linear pipeline (Pipeline.GenerateDigests)"

  # ============================================================================
  # Gemini Tool-Use Protocol
  # ============================================================================

  Orchestrator_to_Gemini:
    protocol: "Gemini function-calling (tool-use)"
    description: >
      The orchestrator maintains a multi-turn conversation with Gemini.
      On each turn, Gemini can respond with text OR one or more function calls.
      The orchestrator executes the function calls and returns results.

    system_prompt: |
      You are a senior editorial AI that produces high-quality weekly technology digests.
      You have access to tools for fetching articles, analyzing content, generating narratives,
      and evaluating quality.

      Your workflow:
      1. INGEST: Fetch and summarize all articles from the input file
      2. TRIAGE: Score articles for relevance and quality. Decide which deserve emphasis.
      3. ANALYZE: Generate embeddings and cluster articles by topic (skip if fewer than 5 articles)
      4. GENERATE: Write cluster narratives and an executive summary
      5. REFLECT: Evaluate your output for specificity, grounding, coherence, reader value, and coverage
      6. REVISE: If reflection identifies weaknesses, fix specific sections and re-reflect
      7. RENDER: Produce the final markdown digest

      Guidelines:
      - Adapt your strategy to corpus size: 2-4 articles need no clustering, 5-15 use simple clustering, 15+ use full analysis
      - Stop revising when quality scores plateau (improvement < 0.05) or max iterations reached
      - Every claim in the executive summary must cite at least one article using [N] notation
      - Prioritize reader value: what would a senior engineer want to know?

    conversation_flow:
      - role: system
        content: "(system prompt above)"
      - role: user
        content: "Generate a digest from {input_file}. Quality threshold: {threshold}. Max iterations: {max_iterations}."
      - role: model
        content: "(Gemini responds with tool calls)"
      - role: tool
        content: "(Tool execution results)"
      - role: model
        content: "(Gemini responds with more tool calls or final text)"
      # ... continues until Gemini produces final text without tool calls

    gemini_config:
      model: "gemini-3-flash-preview"
      tool_config:
        function_calling_config:
          mode: "AUTO"            # Gemini decides when to call tools vs respond with text
      generation_config:
        temperature: 0.3          # Lower temperature for more deterministic orchestration
        max_output_tokens: 8192

  # ============================================================================
  # Tool Definitions (Gemini FunctionDeclaration format)
  # ============================================================================

  # --- Ingestion Tools ---

  tool_fetch_articles:
    name: "fetch_articles"
    description: >
      Fetch and parse articles from a markdown file containing URLs.
      Returns fetched articles with their content. Uses cache when available.
      Call this first to load the article corpus.
    category: "ingestion"
    wraps: "URLParser + ContentFetcher + CacheManager"
    estimated_duration: "slow"
    llm_call: false

    parameters:
      type: object
      properties:
        input_file:
          type: string
          description: "Path to markdown file with URLs"
        use_cache:
          type: boolean
          description: "Whether to use cached content (default: true)"
      required: ["input_file"]

    returns:
      type: object
      properties:
        articles:
          type: array
          description: "List of fetched articles with content"
          items:
            type: object
            properties:
              id: { type: string }
              url: { type: string }
              title: { type: string }
              content_type: { type: string }
              content_preview: { type: string, description: "First 200 chars of cleaned text" }
              word_count: { type: integer }
        total_urls: { type: integer }
        successful: { type: integer }
        failed: { type: integer }
        failed_urls:
          type: array
          items: { type: string }
        cache_hits: { type: integer }

    errors:
      - code: FILE_NOT_FOUND
        description: "Input file does not exist"
      - code: NO_URLS_FOUND
        description: "No valid URLs in the input file"
      - code: ALL_FETCHES_FAILED
        description: "Every URL failed to fetch"

    side_effects:
      - "Stores fetched articles in Working Memory"
      - "Updates cache with newly fetched content"

  tool_summarize_batch:
    name: "summarize_batch"
    description: >
      Generate summaries for articles that do not yet have summaries.
      Uses the existing summarization pipeline with cache support.
      Call after fetch_articles to prepare articles for analysis.
    category: "ingestion"
    wraps: "ArticleSummarizer + CacheManager"
    estimated_duration: "slow"
    llm_call: true

    parameters:
      type: object
      properties:
        article_ids:
          type: array
          description: "IDs of articles to summarize. Omit to summarize all unsummarized articles."
          items: { type: string }
        format:
          type: string
          description: "Summary format"
          enum: ["scannable", "standard", "detailed"]
          default: "scannable"
      required: []

    returns:
      type: object
      properties:
        summaries_generated: { type: integer }
        cache_hits: { type: integer }
        failed: { type: integer }
        articles_with_summaries:
          type: array
          items:
            type: object
            properties:
              article_id: { type: string }
              title: { type: string }
              summary_preview: { type: string, description: "First 150 chars" }

    side_effects:
      - "Stores summaries in Working Memory"
      - "Updates cache with generated summaries"

  tool_triage_articles:
    name: "triage_articles"
    description: >
      Score each article for relevance to a senior engineering audience,
      content quality, and signal strength (newsworthiness).
      Use this to decide which articles deserve emphasis and which to deprioritize.
    category: "ingestion"
    wraps: "New (LLM-based scoring)"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        article_ids:
          type: array
          description: "IDs of articles to triage. Omit to triage all articles."
          items: { type: string }
        audience:
          type: string
          description: "Target audience for relevance scoring"
          default: "senior software engineers"
      required: []

    returns:
      type: object
      properties:
        scores:
          type: array
          items:
            type: object
            properties:
              article_id: { type: string }
              title: { type: string }
              relevance_score: { type: number, description: "0-1" }
              quality_score: { type: number, description: "0-1" }
              signal_strength: { type: number, description: "0-1" }
              recommended_action: { type: string, enum: ["include", "deprioritize", "exclude"] }
              reasoning: { type: string }
        include_count: { type: integer }
        deprioritize_count: { type: integer }
        exclude_count: { type: integer }

    side_effects:
      - "Stores triage scores in Working Memory"

  # --- Analysis Tools ---

  tool_generate_embeddings:
    name: "generate_embeddings"
    description: >
      Generate 768-dimensional embedding vectors for article summaries.
      Required before clustering. Only generates for articles that do not have embeddings yet.
    category: "analysis"
    wraps: "EmbeddingGenerator"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        article_ids:
          type: array
          description: "IDs of articles to embed. Omit to embed all articles with summaries."
          items: { type: string }
      required: []

    returns:
      type: object
      properties:
        embeddings_generated: { type: integer }
        dimensions: { type: integer, description: "Always 768" }
        already_embedded: { type: integer }

    side_effects:
      - "Stores embeddings in Working Memory"

  tool_cluster_articles:
    name: "cluster_articles"
    description: >
      Group articles by topic similarity using K-means clustering on embeddings.
      Requires embeddings to be generated first. Produces topic clusters with labels.
    category: "analysis"
    wraps: "TopicClusterer"
    estimated_duration: "fast"
    llm_call: false

    parameters:
      type: object
      properties:
        num_clusters:
          type: integer
          description: "Number of clusters. 0 = auto-detect based on corpus size."
          default: 0
        min_cluster_size:
          type: integer
          description: "Minimum articles per cluster"
          default: 2
      required: []

    returns:
      type: object
      properties:
        clusters:
          type: array
          items:
            type: object
            properties:
              cluster_id: { type: string }
              label: { type: string }
              article_count: { type: integer }
              article_ids: { type: array, items: { type: string } }
              article_titles: { type: array, items: { type: string } }
        total_clusters: { type: integer }
        unclustered_articles: { type: integer }

    side_effects:
      - "Stores clusters in Working Memory"
      - "Updates article cluster assignments"

  tool_evaluate_clusters:
    name: "evaluate_clusters"
    description: >
      Evaluate the quality of current clusters. Scores coherence (how topically
      similar articles within a cluster are) and separation (how distinct clusters
      are from each other). Suggests improvements like merging or splitting.
    category: "analysis"
    wraps: "quality.ClusterCoherence"
    estimated_duration: "fast"
    llm_call: false

    parameters:
      type: object
      properties:
        cluster_ids:
          type: array
          description: "IDs of clusters to evaluate. Omit to evaluate all."
          items: { type: string }
      required: []

    returns:
      type: object
      properties:
        evaluations:
          type: array
          items:
            type: object
            properties:
              cluster_id: { type: string }
              label: { type: string }
              coherence_score: { type: number }
              separation_score: { type: number }
              size_appropriateness: { type: string }
              suggested_action: { type: string }
              reasoning: { type: string }
        average_coherence: { type: number }
        average_separation: { type: number }
        overall_quality: { type: string, enum: ["good", "acceptable", "needs_improvement"] }

    side_effects:
      - "Stores cluster evaluations in Working Memory"

  # --- Generation Tools ---

  tool_generate_cluster_narrative:
    name: "generate_cluster_narrative"
    description: >
      Generate a narrative summary for a single topic cluster.
      Synthesizes ALL articles in the cluster into a coherent narrative
      with title, key developments, and statistics.
      Call once per cluster.
    category: "generation"
    wraps: "narrative.Generator (cluster-level)"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        cluster_id:
          type: string
          description: "ID of the cluster to narrate"
        style:
          type: string
          description: "Narrative style"
          enum: ["scannable", "narrative", "technical"]
          default: "scannable"
        emphasis_article_ids:
          type: array
          description: "Article IDs to emphasize (from triage). Optional."
          items: { type: string }
      required: ["cluster_id"]

    returns:
      type: object
      properties:
        cluster_id: { type: string }
        title: { type: string, description: "5-8 word cluster title" }
        one_liner: { type: string }
        key_developments: { type: array, items: { type: string } }
        key_stats: { type: array, items: { type: object, properties: { stat: { type: string }, context: { type: string } } } }
        article_refs: { type: array, items: { type: integer } }
        confidence: { type: number }

    side_effects:
      - "Stores narrative in Working Memory"
      - "Associates narrative with cluster"

  tool_generate_executive_summary:
    name: "generate_executive_summary"
    description: >
      Generate the executive summary for the full digest, synthesizing all
      cluster narratives into a cohesive overview. Produces title, TLDR,
      top developments, by-the-numbers, and why-it-matters sections.
      Call after all cluster narratives are generated.
    category: "generation"
    wraps: "narrative.Generator (digest-level)"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        style:
          type: string
          enum: ["scannable", "linkedin", "slack"]
          default: "scannable"
        include_must_read:
          type: boolean
          description: "Whether to include a Must-Read highlight"
          default: true
      required: []

    returns:
      type: object
      properties:
        title: { type: string }
        tldr_summary: { type: string }
        top_developments: { type: array, items: { type: string } }
        by_the_numbers: { type: array, items: { type: object, properties: { stat: { type: string }, context: { type: string } } } }
        why_it_matters: { type: string }
        must_read:
          type: object
          properties:
            article_num: { type: integer }
            title: { type: string }
            why_must_read: { type: string }
            read_time_minutes: { type: integer }
        key_moments: { type: array, items: { type: object } }

    side_effects:
      - "Stores executive summary in Working Memory"
      - "Assembles full digest draft"

  # --- Quality Tools ---

  tool_reflect:
    name: "reflect"
    description: >
      Evaluate the current digest draft for quality across five dimensions:
      specificity, grounding (citation coverage), coherence, reader value,
      and article coverage. Returns scores, identified weaknesses, and a
      recommendation on whether another revision iteration is worthwhile.
      Call after generating executive summary, and after each revision.
    category: "quality"
    wraps: "New (LLM-based evaluation) + quality.DigestEvaluator"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        focus_dimensions:
          type: array
          description: "Dimensions to focus evaluation on. Omit to evaluate all."
          items:
            type: string
            enum: ["specificity", "grounding", "coherence", "reader_value", "coverage"]
      required: []

    returns:
      type: object
      properties:
        iteration: { type: integer }
        overall_score: { type: number, description: "0-1 weighted average" }
        dimension_scores:
          type: object
          properties:
            specificity: { type: number }
            grounding: { type: number }
            coherence: { type: number }
            reader_value: { type: number }
            coverage: { type: number }
        weaknesses:
          type: array
          items:
            type: object
            properties:
              section: { type: string }
              dimension: { type: string }
              description: { type: string }
              severity: { type: string, enum: ["critical", "major", "minor"] }
              suggested_fix: { type: string }
        strengths: { type: array, items: { type: string } }
        improvement_delta: { type: number, description: "Change from previous iteration" }
        should_continue: { type: boolean, description: "Is another revision worthwhile?" }

    side_effects:
      - "Appends ReflectionReport to Working Memory"
      - "Updates quality trajectory"

  tool_revise_section:
    name: "revise_section"
    description: >
      Revise a specific section of the digest based on critique from reflection.
      Takes a section identifier and the weakness to address. Produces an improved
      version of that section only, preserving the rest of the digest.
    category: "quality"
    wraps: "New (LLM-based revision)"
    estimated_duration: "medium"
    llm_call: true

    parameters:
      type: object
      properties:
        section:
          type: string
          description: >
            Section to revise. Format: "executive_summary", "title", "tldr",
            "cluster_narrative:<cluster_id>", "top_developments", "why_it_matters"
        weakness_description:
          type: string
          description: "What is wrong with the current version"
        revision_instructions:
          type: string
          description: "Specific instructions for how to improve"
      required: ["section", "weakness_description"]

    returns:
      type: object
      properties:
        section: { type: string }
        original_content: { type: string, description: "Previous version" }
        revised_content: { type: string, description: "Improved version" }
        changes_made: { type: string, description: "Brief description of what changed" }

    side_effects:
      - "Updates the targeted section in Working Memory"
      - "Appends RevisionRecord to revision log"

  tool_render_digest:
    name: "render_digest"
    description: >
      Render the current digest draft as a markdown file.
      Call this as the final step after all generation and quality checks.
    category: "rendering"
    wraps: "MarkdownRenderer"
    estimated_duration: "fast"
    llm_call: false

    parameters:
      type: object
      properties:
        output_path:
          type: string
          description: "Directory to write the markdown file to"
        format:
          type: string
          enum: ["markdown", "slack"]
          default: "markdown"
      required: []

    returns:
      type: object
      properties:
        file_path: { type: string, description: "Path to rendered file" }
        word_count: { type: integer }
        article_count: { type: integer }
        cluster_count: { type: integer }

    side_effects:
      - "Writes markdown file to disk"

# ============================================================================
# Internal Interfaces (Go)
# ============================================================================

internal_interfaces:

  Tool:
    description: "Interface that all tools implement"
    methods:
      - name: "Name"
        returns: "string"
        description: "Tool identifier matching Gemini function name"
      - name: "Description"
        returns: "string"
        description: "Human-readable description for the LLM"
      - name: "Parameters"
        returns: "genai.Schema"
        description: "JSON Schema for the tool's input parameters (Gemini format)"
      - name: "Execute"
        parameters:
          - name: "ctx"
            type: "context.Context"
          - name: "memory"
            type: "*WorkingMemory"
          - name: "params"
            type: "map[string]any"
        returns: "(map[string]any, error)"
        description: "Execute the tool. Reads/writes state through WorkingMemory."

  Orchestrator:
    description: "Top-level agent orchestrator"
    methods:
      - name: "Run"
        parameters:
          - name: "ctx"
            type: "context.Context"
          - name: "session"
            type: "AgentSession"
        returns: "(AgentDigestResult, error)"
        description: "Execute full agentic digest generation"
      - name: "RegisterTool"
        parameters:
          - name: "tool"
            type: "Tool"
        returns: "error"
        description: "Add a tool to the registry"

  WorkingMemoryInterface:
    description: "State management for the agent session"
    methods:
      - name: "SetArticles"
        parameters: [{ name: "articles", type: "map[string]core.Article" }]
      - name: "GetArticles"
        returns: "map[string]core.Article"
      - name: "SetSummaries"
        parameters: [{ name: "summaries", type: "map[string]core.Summary" }]
      - name: "GetSummaries"
        returns: "map[string]core.Summary"
      - name: "SetClusters"
        parameters: [{ name: "clusters", type: "[]core.TopicCluster" }]
      - name: "GetClusters"
        returns: "[]core.TopicCluster"
      - name: "SetNarrative"
        parameters: [{ name: "clusterID", type: "string" }, { name: "narrative", type: "core.ClusterNarrative" }]
      - name: "GetNarratives"
        returns: "map[string]core.ClusterNarrative"
      - name: "SetExecutiveSummary"
        parameters: [{ name: "summary", type: "string" }]
      - name: "GetDigestDraft"
        returns: "*core.Digest"
      - name: "AddReflection"
        parameters: [{ name: "report", type: "ReflectionReport" }]
      - name: "GetReflections"
        returns: "[]ReflectionReport"
      - name: "GetQualityTrajectory"
        returns: "[]float64"
      - name: "LogToolCall"
        parameters: [{ name: "record", type: "ToolCallRecord" }]
      - name: "Snapshot"
        returns: "WorkingMemorySnapshot"
        description: "Create immutable snapshot for agent context"
